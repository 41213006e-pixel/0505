<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICO Health: Sky Adventure</title>
    <style>
        :root { --sky-top: #00a8ff; --sky-bot: #7ed6df; --pico-dark: #333; --pico-hero: #4ea5ff; --pico-door: #ff7bac; --pico-hp: #ff4757; }
        body { font-family: 'Arial Black', sans-serif; background: linear-gradient(to bottom, var(--sky-top), var(--sky-bot)); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        
        #start-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center;
        }
        #start-btn { padding: 15px 50px; font-size: 24px; background: #fbc531; color: #333; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 #e1b12c; }
        
        #ui-top { display: flex; justify-content: space-between; width: 95%; max-width: 800px; padding: 10px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); color: white; }
        #question-box { background: rgba(255,255,255,0.9); color: #333; padding: 15px; border-radius: 12px; width: 95%; max-width: 800px; text-align: center; margin-bottom: 5px; box-shadow: 0 6px 0 rgba(0,0,0,0.2); font-size: 18px; }
        canvas { background-color: transparent; border: 5px solid white; border-radius: 10px; width: 95%; height: auto; max-height: 60vh; }
        
        #mobile-controls { display: none; width: 95%; max-width: 800px; justify-content: space-between; margin-top: 15px; }
        .control-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.3); border: 3px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; user-select: none; }
        @media (max-width: 850px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

<div id="start-screen">
    <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; border: 2px solid white; margin-bottom: 20px;">
        <h2>🌤️ 天空衛教冒險</h2>
        <p>1. 找出正確答案金幣 🪙<br>2. 避開迷你尖刺 🔺<br>3. <b>掉出螢幕下方會失敗！</b></p>
    </div>
    <button id="start-btn">開始冒險</button>
</div>

<div id="ui-top">
    <div id="status-hp">HP: ❤️❤️❤️</div>
    <div id="status-score">SCORE: 0</div>
</div>
<div id="question-box">準備出發...</div>
<canvas id="game-canvas" width="800" height="500"></canvas>

<div id="mobile-controls">
    <div style="display:flex; gap:20px;"><div class="control-btn" id="l">⬅️</div><div class="control-btn" id="r">➡️</div></div>
    <div class="control-btn" id="j">⬆️</div>
</div>

<script>
    const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
    const quizBank = [
        { q: "成人每日建議飲水量是體重(kg)乘以多少？", options: ["10ml", "20ml", "30-35ml", "100ml"], correct: 2 },
        { q: "下列哪種運動最能增進心肺功能？", options: ["看電視", "慢跑", "睡覺", "發呆"], correct: 1 },
        { q: "洗手「內外夾弓大立腕」，最後是？", options: ["指甲", "手指", "手心", "手腕"], correct: 3 },
        { q: "預防近視，用眼30分鐘應休息多久？", options: ["1分鐘", "10分鐘", "30分鐘", "不必"], correct: 1 }
    ];

    let cur = 0, score = 0, hp = 3, door = false, platforms = [], coins = [], spikes = [], clouds = [];
    const player = { x: 50, y: 50, vx: 0, vy: 0, size: 30, ground: false };
    const keys = {};

    function generateMap() {
        platforms = []; coins = []; spikes = [];
        // 第一層起點
        platforms.push({x:0, y:120, w:300, h:15});
        // 第二層隨機 (可能分段)
        if(Math.random() > 0.5) {
            platforms.push({x:50, y:280, w:250, h:15}, {x:500, y:280, w:250, h:15});
        } else {
            platforms.push({x:200, y:280, w:400, h:15});
        }
        // 第三層
        platforms.push({x:0, y:440, w:350, h:15}, {x:550, y:440, w:250, h:15});

        // 生成金幣 (嚴格防重疊)
        const opts = quizBank[cur].options;
        opts.forEach((text, i) => {
            let valid = false, cx, cy;
            while(!valid) {
                let p = platforms[Math.floor(Math.random()*platforms.length)];
                cx = p.x + 20 + Math.random()*(p.w - 80);
                cy = p.y - 45;
                // 檢查與其他金幣距離
                const nearCoin = coins.some(c => Math.abs(c.x - cx) < 160);
                if (!nearCoin && !(cy < 150 && cx < 150)) valid = true;
            }
            coins.push({x:cx, y:cy, text, correct: i === quizBank[cur].correct});
        });

        // 迷你尖刺
        for(let i=0; i<4; i++) {
            let p = platforms[Math.floor(Math.random()*platforms.length)];
            if(p.y < 150) continue; 
            spikes.push({x: p.x + 50 + Math.random()*(p.w-100), y: p.y - 12});
        }

        player.x = 50; player.y = 50; player.vx = 0; player.vy = 0;
    }

    function init() {
        door = false; 
        if(clouds.length === 0) {
            for(let i=0; i<6; i++) clouds.push({x: Math.random()*800, y: Math.random()*400, s: 0.3+Math.random()});
        }
        generateMap();
        updateUI();
    }

    function updateUI() {
        document.getElementById('question-box').innerText = quizBank[cur].q;
        document.getElementById('question-box').style.background = "rgba(255,255,255,0.9)";
        document.getElementById('status-hp').innerText = "HP: "+"❤️".repeat(hp);
        document.getElementById('status-score').innerText = "SCORE: " + score;
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        init(); loop();
    };

    const handleInput = (id, k, val) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', e=>{e.preventDefault(); keys[k]=val;});
        el.addEventListener('touchend', e=>{e.preventDefault(); keys[k]=false;});
    };
    handleInput('l','ArrowLeft',true); handleInput('r','ArrowRight',true); handleInput('j','ArrowUp',true);
    window.addEventListener('keydown', e=>keys[e.code]=true);
    window.addEventListener('keyup', e=>keys[e.code]=false);

    function update() {
        player.vx = keys['ArrowLeft'] || keys['KeyA'] ? -5.5 : (keys['ArrowRight'] || keys['KeyD'] ? 5.5 : player.vx * 0.85);
        if((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.ground){ player.vy = -13; player.ground = false; }
        player.vy += 0.65; player.x += player.vx; player.y += player.vy; player.ground = false;
        
        platforms.forEach(p => { 
            if(player.x+25>p.x && player.x+5<p.x+p.w && player.y+30>p.y && player.y+30<p.y+20 && player.vy>=0){ 
                player.y=p.y-30; player.vy=0; player.ground=true; 
            }
        });

        spikes.forEach(s => {
            if(player.x+25>s.x && player.x+5<s.x+15 && player.y+30>s.y && player.y<s.y+12) die();
        });

        clouds.forEach(c => { c.x += c.s; if(c.x > 850) c.x = -100; });

        coins.forEach(c => { 
            if(!c.hide && Math.abs(player.x-c.x)<35 && Math.abs(player.y-c.y)<45){ 
                c.hide=true; 
                if(c.correct){ 
                    door=true; score+=100; 
                    document.getElementById('question-box').innerText="正確！前往右下角傳送門"; 
                    document.getElementById('question-box').style.background="#dff9fb"; 
                } else { score=Math.max(0,score-20); die(); }
            }
        });

        if(player.y>510) die(); // 掉下去失敗
        if(player.x<0) player.x=0; if(player.x>770) player.x=770;

        if(door && player.x>700 && player.y>380){ 
            cur++; 
            if(cur<quizBank.length) init(); 
            else { alert("天空英雄！總分:"+score); location.reload(); }
        }
        updateUI();
    }

    function die() { 
        hp--; 
        if(hp<=0){ alert("墜落天空！分數:"+score); location.reload(); } 
        else { init(); }
    }

    function draw() {
        ctx.clearRect(0,0,800,500);

        // 畫雲
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        clouds.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, 20, 0, 7); ctx.arc(c.x+25, c.y-10, 30, 0, 7); ctx.arc(c.x+50, c.y, 20, 0, 7);
            ctx.fill();
        });

        // 畫平台
        ctx.fillStyle="white";
        platforms.forEach(p=> {
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle="rgba(0,0,0,0.1)"; ctx.fillRect(p.x, p.y+15, p.w, 5); ctx.fillStyle="white";
        });

        // 畫迷你尖刺
        ctx.fillStyle="#eb4d4b";
        spikes.forEach(s => {
            ctx.beginPath(); ctx.moveTo(s.x, s.y+12); ctx.lineTo(s.x+7, s.y); ctx.lineTo(s.x+14, s.y+12); ctx.fill();
        });

        // 畫金幣
        coins.forEach(c=>{
            if(!c.hide){
                ctx.fillStyle="#f1c40f"; ctx.beginPath(); ctx.arc(c.x+15,c.y+15,13,0,7); ctx.fill();
                ctx.fillStyle="white"; ctx.strokeStyle="black"; ctx.lineWidth=2; ctx.stroke();
                ctx.fillStyle="#333"; ctx.font="bold 15px sans-serif"; ctx.textAlign="center"; ctx.fillText(c.text,c.x+15,c.y-10);
            }
        });

        // 畫門
        ctx.fillStyle=door?"#ff7bac":"rgba(255,255,255,0.3)"; 
        ctx.fillRect(720,380,50,60); ctx.strokeStyle="white"; ctx.strokeRect(720,380,50,60);
        
        // 畫玩家
        ctx.fillStyle="#4ea5ff"; ctx.fillRect(player.x,player.y,30,30); ctx.strokeStyle="white"; ctx.strokeRect(player.x,player.y,30,30);
        ctx.fillStyle="black"; ctx.fillRect(player.x+6,player.y+8,4,4); ctx.fillRect(player.x+20,player.y+8,4,4);
    }
    function loop() { update(); draw(); requestAnimationFrame(loop); }
</script>
</body>
</html>
